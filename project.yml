name: Smashcut
options:
  bundleIdPrefix: com.nh273
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""  # Set your team in Xcode: Smashcut target → Signing & Capabilities

packages:
  Cabbage:
    url: https://github.com/VideoFlint/Cabbage.git
    from: "0.4.2"

targets:
  Smashcut:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Smashcut
    info:
      path: Smashcut/Info.plist
      properties:
        NSCameraUsageDescription: "Smashcut needs camera access to record your narration."
        NSMicrophoneUsageDescription: "Smashcut needs microphone access to record your voice."
        NSPhotoLibraryAddUsageDescription: "Smashcut needs permission to save exported videos to your camera roll."
        NSPhotoLibraryUsageDescription: "Smashcut needs photo library access to pick background media."
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nh273.smashcut
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Smashcut/Info.plist
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: Vision.framework
      - sdk: Photos.framework
      - sdk: CoreImage.framework
      - package: Cabbage

  SmashcutTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SmashcutTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nh273.smashcut.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Smashcut

  SmashcutUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SmashcutUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nh273.smashcut.uitests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Smashcut
